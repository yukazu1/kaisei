  <div> <font color="white">計算ができない海成のための電卓<div></font>
  <input style="font-size: 70px;width:420px; color:white;text-align: right;background:black;border: none" /><br />
  <script>
    function update( _v ) // input tag　を更新する関数
    {
      document. querySelector( 'input' ).value = _v
    }
    
    
    function append ( _v)//数字ボタンが押されたので数字を後ろに追加する
    {
      document. querySelector( 'input' ). value += _v
    }

    function  calc() // 「＝」が押されたので計算する
    {
      const v = document. querySelector( 'input' ).value
      try{
        const f = new Function( 'return ' + v )
        update( f().toString() )
        } catch( _error ){}
          
        
    }

    </script>
  <button onclick="update ( '' )" style="background:white;">C </button>

                                                 <button onclick="append( '**' )"style="background:white;">^</button>
<button onclick="append( '**0.5' )"style="background:white;">√</button>
